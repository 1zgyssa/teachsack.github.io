<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置数据测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 28px; }
        .section { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section h2 { font-size: 18px; margin-bottom: 15px; color: #ffd700; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,215,0,0.4); }
        .btn-danger { background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,68,68,0.4); }
        .btn-info { background: linear-gradient(135deg, #4488ff, #0066cc); color: #fff; }
        .btn-info:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(68,136,255,0.4); }
        .output { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; margin-top: 15px; font-family: monospace; font-size: 14px; white-space: pre-wrap; word-break: break-all; }
        .status { margin-top: 15px; padding: 10px; border-radius: 8px; font-weight: bold; }
        .status.success { background: rgba(0,255,0,0.2); color: #00ff00; }
        .status.error { background: rgba(255,0,0,0.2); color: #ff0000; }
        .status.info { background: rgba(255,215,0,0.2); color: #ffd700; }
        .test-steps { margin-top: 20px; }
        .test-step { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .step-num { width: 30px; height: 30px; background: #ffd700; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .step-content { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 重置数据功能测试</h1>
        
        <div class="test-steps">
            <div class="test-step">
                <div class="step-num">1</div>
                <div class="step-content">设置模拟数据（激活码 + 学生名单）</div>
            </div>
            <div class="test-step">
                <div class="step-num">2</div>
                <div class="step-content">检查 localStorage 和模拟文件状态</div>
            </div>
            <div class="test-step">
                <div class="step-num">3</div>
                <div class="step-content">执行重置数据操作</div>
            </div>
            <div class="test-step">
                <div class="step-num">4</div>
                <div class="step-content">验证名单是否被清空，激活码是否保留</div>
            </div>
        </div>

        <div class="section">
            <h2>📦 步骤1：设置模拟数据</h2>
            <button class="btn btn-primary" onclick="setupTestData()">设置模拟数据</button>
            <div id="setupStatus" class="status"></div>
            <div id="setupOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>📊 步骤2：查看当前状态</h2>
            <button class="btn btn-info" onclick="checkStatus()">查看状态</button>
            <div id="statusOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>🗑️ 步骤3：执行重置数据</h2>
            <button class="btn btn-danger" onclick="executeReset()">执行重置数据</button>
            <div id="resetStatus" class="status"></div>
            <div id="resetOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>✅ 步骤4：验证结果</h2>
            <button class="btn btn-info" onclick="verifyResult()">验证结果</button>
            <div id="verifyOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>🧹 清理测试数据</h2>
            <button class="btn btn-info" onclick="clearAll()">清空所有测试数据</button>
        </div>
    </div>

    <script>
        const DATA_KEYS = [
            'classRoster', 'statsScores', 'punishmentList', 'settings', 
            'quizCustomQuestions', 'calledStudents', 'theme', 'animationSpeed',
            'license_list', 'trial_license', 'trial_count'
        ];
        const LICENSE_KEYS_PATTERN = /^license_device_/;

        let mockAppDirData = null;

        function setupTestData() {
            const rosterData = JSON.stringify([
                { id: 1, name: '张三', gender: '男' },
                { id: 2, name: '李四', gender: '女' },
                { id: 3, name: '王五', gender: '男' },
                { id: 4, name: '赵六', gender: '女' }
            ]);
            
            localStorage.setItem('classRoster', rosterData);
            localStorage.setItem('trial_license', 'TEST');
            localStorage.setItem('trial_count', '0');
            localStorage.setItem('license_device_TEST', 'test_device_12345');
            localStorage.setItem('theme', '"dark"');
            localStorage.setItem('settings', JSON.stringify({ volume: 0.8, animationSpeed: 'normal' }));

            mockAppDirData = {
                version: '1.2.4',
                exportTime: new Date().toISOString(),
                data: {
                    classRoster: JSON.parse(rosterData),
                    trial_license: 'TEST',
                    trial_count: 0,
                    license_device_TEST: 'test_device_12345',
                    theme: 'dark',
                    settings: { volume: 0.8, animationSpeed: 'normal' }
                }
            };

            document.getElementById('setupStatus').className = 'status success';
            document.getElementById('setupStatus').innerText = '✅ 模拟数据已设置完成！';
            document.getElementById('setupOutput').innerText = JSON.stringify(mockAppDirData, null, 2);
        }

        function checkStatus() {
            const result = {
                localStorage: {},
                mockAppDirData: mockAppDirData ? '存在' : '不存在'
            };

            DATA_KEYS.forEach(key => {
                const value = localStorage.getItem(key);
                result.localStorage[key] = value ? (value.length > 100 ? value.substring(0, 100) + '...' : value) : null;
            });

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && LICENSE_KEYS_PATTERN.test(key)) {
                    result.localStorage[key] = localStorage.getItem(key);
                }
            }

            document.getElementById('statusOutput').innerText = JSON.stringify(result, null, 2);
        }

        function executeReset() {
            const licenseData = {};
            DATA_KEYS.forEach(key => {
                if (key === 'trial_license' || key === 'trial_count' || key === 'license_list') {
                    const value = localStorage.getItem(key);
                    if (value !== null) {
                        licenseData[key] = value;
                    }
                }
            });
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && LICENSE_KEYS_PATTERN.test(key)) {
                    licenseData[key] = localStorage.getItem(key);
                }
            }

            mockAppDirData = null;

            const allKeys = Object.keys(localStorage);
            allKeys.forEach(key => {
                localStorage.removeItem(key);
            });

            Object.keys(licenseData).forEach(key => {
                localStorage.setItem(key, licenseData[key]);
            });

            const newBackupData = {
                version: '1.2.4',
                exportTime: new Date().toISOString(),
                data: {}
            };
            Object.keys(licenseData).forEach(key => {
                try {
                    newBackupData.data[key] = JSON.parse(licenseData[key]);
                } catch {
                    newBackupData.data[key] = licenseData[key];
                }
            });
            mockAppDirData = newBackupData;

            document.getElementById('resetStatus').className = 'status success';
            document.getElementById('resetStatus').innerText = '✅ 重置数据已执行完成！';
            document.getElementById('resetOutput').innerText = 
                '备份的激活码数据:\n' + JSON.stringify(licenseData, null, 2) + 
                '\n\n新的应用目录数据:\n' + JSON.stringify(newBackupData, null, 2);
        }

        function verifyResult() {
            const result = {
                classRoster: localStorage.getItem('classRoster'),
                trialLicense: localStorage.getItem('trial_license'),
                trialCount: localStorage.getItem('trial_count'),
                licenseDevice: localStorage.getItem('license_device_TEST'),
                otherData: {}
            };

            DATA_KEYS.forEach(key => {
                if (key !== 'classRoster' && key !== 'trial_license' && key !== 'trial_count') {
                    result.otherData[key] = localStorage.getItem(key);
                }
            });

            let summary = '验证结果:\n\n';
            let allPassed = true;

            if (!result.classRoster) {
                summary += '✅ 学生名单已清空\n';
            } else {
                summary += '❌ 学生名单未清空！\n';
                allPassed = false;
            }

            if (result.trialLicense === 'TEST') {
                summary += '✅ 激活码已保留\n';
            } else {
                summary += '❌ 激活码丢失！\n';
                allPassed = false;
            }

            if (result.trialCount === '0') {
                summary += '✅ 试用次数已保留\n';
            } else {
                summary += '❌ 试用次数丢失！\n';
                allPassed = false;
            }

            if (result.licenseDevice === 'test_device_12345') {
                summary += '✅ 设备绑定已保留\n';
            } else {
                summary += '❌ 设备绑定丢失！\n';
                allPassed = false;
            }

            const otherKeys = Object.keys(result.otherData).filter(k => result.otherData[k] !== null);
            if (otherKeys.length === 0) {
                summary += '✅ 其他数据已清空\n';
            } else {
                summary += '❌ 以下数据未清空: ' + otherKeys.join(', ') + '\n';
                allPassed = false;
            }

            summary += '\n' + (allPassed ? '🎉 所有测试通过！' : '⚠️ 部分测试未通过！');

            document.getElementById('verifyOutput').innerText = summary;
        }

        function clearAll() {
            const allKeys = Object.keys(localStorage);
            allKeys.forEach(key => {
                localStorage.removeItem(key);
            });
            mockAppDirData = null;
            document.getElementById('setupStatus').innerText = '';
            document.getElementById('setupOutput').innerText = '';
            document.getElementById('statusOutput').innerText = '';
            document.getElementById('resetStatus').innerText = '';
            document.getElementById('resetOutput').innerText = '';
            document.getElementById('verifyOutput').innerText = '';
            alert('所有测试数据已清空！');
        }
    </script>
</body>
</html>
