<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课趣工具箱 - 激活码生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: #aaa;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .input-group input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ffd700;
        }
        .input-group input::placeholder {
            color: #666;
        }
        .btn {
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .result-area {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 20px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #ffd700;
            line-height: 2;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .result-area:empty::before {
            content: '生成的激活码将显示在这里...';
            color: #666;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .actions .btn {
            flex: 1;
        }
        .info {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
        .counter {
            text-align: center;
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .login-container {
            text-align: center;
        }
        .login-container .password-input {
            width: 100%;
            padding: 20px;
            font-size: 20px;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .login-container .password-input:focus {
            border-color: #ffd700;
        }
        .login-error {
            color: #f44336;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .login-success {
            color: #4CAF50;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .logout-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 16px;
            font-size: 12px;
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        .logout-btn:hover {
            background: rgba(244, 67, 54, 0.3);
        }
        .timer {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="login-container" id="loginPanel">
            <div class="lock-icon">🔒</div>
            <div class="header">
                <h1>管理员登录</h1>
                <p>请输入管理员密码以访问激活码生成器</p>
            </div>
            <div class="login-error" id="loginError">密码错误，请重试</div>
            <input type="password" id="passwordInput" class="password-input" placeholder="●●●●●●●●" maxlength="20">
            <button class="btn btn-primary" onclick="login()">登 录</button>
            <div class="timer" id="sessionTimer"></div>
        </div>

        <div id="generatorPanel" style="display: none; position: relative;">
            <button class="btn logout-btn" onclick="logout()">退出登录</button>
            
            <div class="header">
                <h1>⚡ 激活码生成器</h1>
                <p>用于课趣·教学工具箱的激活码批量生成</p>
            </div>
            
            <div class="input-group">
                <input type="number" id="countInput" placeholder="生成数量" min="1" max="1000" value="10">
                <button class="btn btn-primary" onclick="generateCodes()">生成激活码</button>
            </div>
            
            <div class="counter" id="counter"></div>
            
            <div class="result-area" id="resultArea"></div>
            
            <div class="actions">
                <button class="btn btn-secondary" onclick="copyAll()">📋 复制全部</button>
                <button class="btn btn-secondary" onclick="exportCodes()">📤 导出为TXT</button>
            </div>
            
            <div class="info">
                激活码格式: XXXX-XXXX-XXXX-XXXX<br>
                生成的激活码无需添加到代码中，可直接使用
            </div>
        </div>
    </div>

    <script>
        const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        const SECRET_KEY = 'K3yG3n3r@t0r!2024';
        const PASSWORD_HASH = '4681a15d0e51191f28d8d3e0a2dbb53a6968889624e13a217024f47bfa6ba15b';
        const SESSION_TIMEOUT = 300;
        
        let generatedCodes = [];
        let sessionTimer = null;
        let remainingTime = SESSION_TIMEOUT;

        function sha256(message) {
            const encodeUtf8 = (str) => {
                const bytes = [];
                for (let i = 0; i < str.length; i++) {
                    bytes.push(str.charCodeAt(i));
                }
                return bytes;
            };
            
            const bytes = encodeUtf8(message);
            const padding = [128];
            const blockSize = 64;
            const totalLength = bytes.length * 8;
            const paddingLength = blockSize - ((totalLength / 8) % blockSize);
            
            if (paddingLength === 0) paddingLength = blockSize;
            if (paddingLength < 9) paddingLength += blockSize;
            
            for (let i = 1; i < paddingLength - 8; i++) {
                padding.push(0);
            }
            
            const lengthBits = totalLength.toString(2).padStart(64, '0');
            for (let i = 0; i < 8; i++) {
                padding.push(parseInt(lengthBits.slice(i * 8, (i + 1) * 8), 2));
            }
            
            const data = [...bytes, ...padding];
            
            const rotateRight = (n, bits) => ((n >>> bits) | (n << (32 - bits))) >>> 0;
            const ch = (x, y, z) => (x & y) ^ (~x & z);
            const maj = (x, y, z) => (x & y) ^ (x & z) ^ (y & z);
            const sigma0 = (x) => rotateRight(x, 2) ^ rotateRight(x, 13) ^ rotateRight(x, 22);
            const sigma1 = (x) => rotateRight(x, 6) ^ rotateRight(x, 11) ^ rotateRight(x, 25);
            const gamma0 = (x) => rotateRight(x, 7) ^ rotateRight(x, 18) ^ (x >>> 3);
            const gamma1 = (x) => rotateRight(x, 17) ^ rotateRight(x, 19) ^ (x >>> 10);
            
            const K = [
                0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5,
                0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3,
                0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc,
                0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7,
                0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13,
                0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3,
                0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5,
                0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208,
                0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
            ];
            
            let h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a;
            let h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;
            
            for (let i = 0; i < data.length; i += 64) {
                const w = [];
                for (let j = 0; j < 16; j++) {
                    w[j] = (data[i + j * 4] << 24) | (data[i + j * 4 + 1] << 16) |
                           (data[i + j * 4 + 2] << 8) | data[i + j * 4 + 3];
                }
                
                for (let j = 16; j < 64; j++) {
                    w[j] = (gamma1(w[j - 2]) + w[j - 7] + gamma0(w[j - 15]) + w[j - 16]) >>> 0;
                }
                
                let a = h0, b = h1, c = h2, d = h3;
                let e = h4, f = h5, g = h6, h = h7;
                
                for (let j = 0; j < 64; j++) {
                    const t1 = (h + sigma1(e) + ch(e, f, g) + K[j] + w[j]) >>> 0;
                    const t2 = (sigma0(a) + maj(a, b, c)) >>> 0;
                    h = g; g = f; f = e; e = (d + t1) >>> 0;
                    d = c; c = b; b = a; a = (t1 + t2) >>> 0;
                }
                
                h0 = (h0 + a) >>> 0; h1 = (h1 + b) >>> 0;
                h2 = (h2 + c) >>> 0; h3 = (h3 + d) >>> 0;
                h4 = (h4 + e) >>> 0; h5 = (h5 + f) >>> 0;
                h6 = (h6 + g) >>> 0; h7 = (h7 + h) >>> 0;
            }
            
            const hash = [h0, h1, h2, h3, h4, h5, h6, h7];
            return hash.map(x => x.toString(16).padStart(8, '0')).join('');
        }

        function computeChecksum(body) {
            let hash = 0;
            for (let i = 0; i < body.length; i++) {
                hash = ((hash << 5) - hash) + body.charCodeAt(i);
                hash |= 0;
            }
            for (let i = 0; i < SECRET_KEY.length; i++) {
                hash = ((hash << 5) - hash) + SECRET_KEY.charCodeAt(i);
                hash |= 0;
            }
            hash = Math.abs(hash);
            let result = '';
            for (let i = 0; i < 4; i++) {
                result += CHARS[hash % CHARS.length];
                hash = Math.floor(hash / CHARS.length);
            }
            return result;
        }

        function generateCode() {
            let code = '';
            for (let i = 0; i < 12; i++) {
                code += CHARS[Math.floor(Math.random() * CHARS.length)];
            }
            code += computeChecksum(code);
            return code.slice(0, 4) + '-' + code.slice(4, 8) + '-' + code.slice(8, 12) + '-' + code.slice(12);
        }

        function generateCodes() {
            const count = parseInt(document.getElementById('countInput').value) || 1;
            const resultArea = document.getElementById('resultArea');
            const counter = document.getElementById('counter');
            
            generatedCodes = [];
            for (let i = 0; i < count; i++) {
                generatedCodes.push(generateCode());
            }
            
            resultArea.textContent = generatedCodes.join('\n');
            counter.textContent = `已生成 ${count} 个激活码`;
        }

        function copyAll() {
            const text = generatedCodes.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板！');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }

        function exportCodes() {
            const text = generatedCodes.join('\n');
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `激活码_${new Date().toISOString().slice(0, 10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert('已导出激活码文件！');
        }

        function login() {
            const password = document.getElementById('passwordInput').value;
            const error = document.getElementById('loginError');
            
            if (!password) {
                error.textContent = '请输入密码';
                error.style.display = 'block';
                return;
            }
            
            const hash = sha256(password);
            
            if (hash === PASSWORD_HASH) {
                error.style.display = 'none';
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('generatorPanel').style.display = 'block';
                startSessionTimer();
            } else {
                error.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function logout() {
            document.getElementById('generatorPanel').style.display = 'none';
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('resultArea').textContent = '';
            document.getElementById('counter').textContent = '';
            generatedCodes = [];
            stopSessionTimer();
        }

        function startSessionTimer() {
            remainingTime = SESSION_TIMEOUT;
            updateTimerDisplay();
            
            if (sessionTimer) clearInterval(sessionTimer);
            
            sessionTimer = setInterval(() => {
                remainingTime--;
                updateTimerDisplay();
                
                if (remainingTime <= 0) {
                    logout();
                }
            }, 1000);
        }

        function stopSessionTimer() {
            if (sessionTimer) {
                clearInterval(sessionTimer);
                sessionTimer = null;
            }
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(remainingTime / 60);
            const seconds = remainingTime % 60;
            document.getElementById('sessionTimer').textContent = 
                `会话剩余时间: ${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
